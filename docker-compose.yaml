services:
  edge-proxy:
    container_name: edge-proxy
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      platform-core-service:
        condition: service_healthy
      message-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - devnexus-network

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./frontend/.env.production
    # ← bỏ ports, chỉ expose qua nginx
    depends_on:
      platform-core-service:
        condition: service_healthy
      background_job_worker:
        condition: service_started
    networks:
      - devnexus-network

  platform-core-service:
    container_name: platform-core-service
    build:
      context: .
      dockerfile: ./platform-core-service/Dockerfile
    volumes:
      - platform_core_upload:/var/www/uploads
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - devnexus-network

  message-service:
    container_name: message-service
    build:
      context: ./message-service
      dockerfile: Dockerfile
    env_file:
      - ./message-service/.env.production
    volumes:
      - message_service_upload:/var/www/Message-Upload
    depends_on:
      platform-core-service:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - devnexus-network

  notification-service:
    container_name: notification-service
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    env_file:
      - ./notification-service/.env.production
    depends_on:
      platform-core-service:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - devnexus-network

  ai-worker:
    container_name: ai-worker
    env_file:
      - ./ai-worker/.env.production
    build:
      context: ./ai-worker
      dockerfile: Dockerfile
    volumes:
      - "D:/ai-worker-store/model/my-final-toxic-model:/app/models/my-final-toxic-model"
      - "D:/ai-worker-store/cache:/app/.hf_cache"
    depends_on:
      platform-core-service:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - devnexus-network

  background_job_worker:
    container_name: background_job_worker
    build:
      context: .
      dockerfile: ./background-job-worker/Dockerfile
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devnexus-network

  postgres:
    container_name: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: niko1234
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./script/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devnexus-network

  postgres-init:
    container_name: postgres-init
    image: postgres:16-alpine
    environment:
      PGPASSWORD: niko1234
    volumes:
      - ./script/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    depends_on:
      postgres:
        condition: service_healthy
    command: ["psql", "-h", "postgres", "-U", "postgres", "-d", "postgres", "-f", "/docker-entrypoint-initdb.d/init.sql"]
    networks:
      - devnexus-network

  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_log:/var/log/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devnexus-network

  redis:
    container_name: redis-server
    image: redis
    restart: always
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devnexus-network

volumes:
  postgres_data:
  rabbitmq_data:
  rabbitmq_log:
  redis_data:
  platform_core_upload:
  message_service_upload:

networks:
  devnexus-network:
    driver: bridge
map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name _;  # accept mọi hostname, kể cả ngrok domain

  # Cho phép ngrok header đi qua
  underscores_in_headers on;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Tăng timeout cho WebSocket
  proxy_read_timeout 3600s;
  proxy_send_timeout 3600s;

  location /message-service/ {
    rewrite ^/message-service/(.*)$ /$1 break;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_pass http://message-service:3001;
  }

  location /notification-service/ {
    rewrite ^/notification-service/(.*)$ /$1 break;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_pass http://notification-service:3002;
  }

  location /plat-form-core-service/ {
    rewrite ^/plat-form-core-service/(.*)$ /$1 break;
    proxy_pass http://platform-core-service:8080;
  }

  location / {
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_pass http://frontend:3000;
  }
}